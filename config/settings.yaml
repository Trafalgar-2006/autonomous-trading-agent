# ============================================================
# Trading Agent — Global Configuration
# ============================================================

general:
  name: "TradingAgent"
  version: "0.2.0"
  mode: "paper"                  # paper | live
  execution_mode: "auto"         # auto = trade APPROVED signals | propose = memos only, human executes
  # Strategy engine:
  #   ensemble     = mean_reversion + breakout, with SPY>200SMA market filter (lower drawdown, does NOT beat SPY)
  #   xs_momentum  = 12-month cross-sectional momentum on a broad universe
  #                  (walk-forward BEAT SPY on CAGR/Sharpe/Sortino; ~30% drawdown)
  # Set to xs_momentum to forward paper-test the edge; switch to ensemble for lower drawdown.
  strategy_mode: "xs_momentum"
  timezone: "US/Eastern"
  log_level: "INFO"

# Forward test — the number live is compared against, fixed IN ADVANCE.
# Baseline = FULL-CYCLE walk-forward including the 2008 crash (deep Yahoo history,
# 2005-2026, 38 folds), for the deployed config (xs_momentum + vol_target 0.25):
#   strategy: CAGR 10.9%, Sharpe 0.83, MaxDD 29.4%   (SPY B&H: 10.5%, 0.61, 55.2%)
# NB: the 2019-2026 sub-window alone ran much hotter (~27% CAGR) — that is a
# favorable regime, NOT a sustainable expectation. Use the full-cycle number.
forward_test:
  baseline:
    cagr: 0.109
    sharpe: 0.83
    max_drawdown: 0.294

# AI Analyst — Claude-powered morning brief + EOD narrative (the "2 daily messages").
# Optional: needs ANTHROPIC_API_KEY in .env; disables cleanly without it.
ai_analyst:
  enabled: true
  model: "claude-opus-4-8"       # or claude-haiku-4-5 for cheaper/faster briefs
  effort: "low"                  # low | medium | high (ignored for haiku)
  explain_trades: false          # also generate a per-trade explanation (more API calls)

# Cross-sectional momentum settings (used when strategy_mode = xs_momentum)
cross_sectional:
  lookback_days: 252             # ~12 months trailing return to rank on
  skip_days: 21                  # skip the most recent ~1 month (12-1 momentum; less crowded/reversal-prone)
  top_n: 8                       # number of top names to hold
  use_broad_universe: true       # rank the wider ~70-name research universe
  vol_target: 0.25               # ADOPTED: proven crash protection — cut the 2008 fold from
                                 # -30% to -21% and full-cycle MaxDD 41%->29% at similar CAGR.
                                 # Set null for raw momentum (higher return, ~41% drawdowns).
  include_crypto: false          # also rank crypto (24/7; validate live execution separately)
  crypto_symbols: ["BTC/USD", "ETH/USD"]

# ============================================================
# Universe — Core symbols (always monitored)
# ============================================================
universe:
  # These are always scanned regardless of market scanner results
  symbols:
    # --- Current Holdings ---
    - "KMI"      # Kinder Morgan (currently held)
    # --- Large Cap Tech ---
    - "AAPL"     # Apple
    - "MSFT"     # Microsoft
    - "GOOGL"    # Alphabet
    - "AMZN"     # Amazon
    - "NVDA"     # Nvidia
    - "META"     # Meta
    - "TSLA"     # Tesla
    - "AMD"      # AMD
    # --- ETFs ---
    - "SPY"      # S&P 500 ETF
    - "QQQ"      # Nasdaq 100 ETF
    - "IWM"      # Russell 2000 Small Cap
    - "XLE"      # Energy sector
    - "XLF"      # Financials sector
    # --- High-Volume Mid/Large Cap ---
    - "JPM"      # JPMorgan
    - "BAC"      # Bank of America
    - "INTC"     # Intel
    - "NFLX"     # Netflix
    - "CRM"      # Salesforce
    - "DIS"      # Disney
    - "GS"       # Goldman Sachs
    - "UBER"     # Uber
    - "COIN"     # Coinbase
    - "PLTR"     # Palantir

  # Data settings
  lookback_days: 365             # How much historical data to load
  timeframe: "1Day"              # 1Min, 5Min, 15Min, 1Hour, 1Day

# ============================================================
# Market Scanner — Discovers opportunities from entire market
# ============================================================
scanner:
  enabled: true                  # Enable market-wide scanning
  min_price: 2.00                # Min stock price (skip sub-$2 penny stocks)
  max_price: 1500.00             # Max stock price
  min_avg_volume: 500000         # Min 20-day avg volume (liquidity filter)
  max_candidates: 100            # Max stocks to add from scanner
  require_fractional: true       # Only scan fractional-share stocks
  scan_time: "09:00"             # Run scanner daily at 9 AM ET (pre-market)
  
# ============================================================
# Scheduling — When to run
# ============================================================
schedule:
  # Market scan & signal generation
  scan_interval_minutes: 30      # Run strategy scan every 30 min during market hours
  
  # Market hours (US Eastern)
  market_open: "09:30"
  market_close: "16:00"
  
  # Pre-market analysis
  pre_market_scan: "09:15"       # Run analysis 15 min before open
  
  # End-of-day review
  eod_review: "16:05"            # Review positions after close

# ============================================================
# Database
# ============================================================
database:
  type: "sqlite"
  path: "data/trading.db"
