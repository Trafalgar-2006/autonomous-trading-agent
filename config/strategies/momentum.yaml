strategy:
  name: "momentum"
  # DISABLED 2026-07-21 based on walk-forward evidence: with momentum the
  # ensemble returned -1.49% CAGR (attribution: momentum -$4.3k); without it,
  # +5.78% CAGR / 0.50 Sharpe with lower drawdown. Re-enable only if a fixed
  # momentum variant proves out in `python -m src.main experiments`.
  enabled: false
  weight: 1.0
  
  parameters:
    # RSI
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    
    # MACD
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    
    # Moving Averages
    ema_fast: 9
    ema_slow: 21
    sma_trend: 50
    
    # ADX (trend strength)
    adx_period: 14
    adx_threshold: 25
    
    # Minimum confidence to emit signal
    min_confidence: 0.5
